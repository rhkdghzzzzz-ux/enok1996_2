<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 폰 추천 테스트 | KT</title>

  <!-- ══════════════════════════════════════════
       Google AdSense — 헤드 스크립트 삽입 위치
       <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  ══════════════════════════════════════════ -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #FFFFFF;
      --surface: #F5F5F7;
      --sur2:    #EAEAEC;
      --text:    #1D1D1F;
      --muted:   #6E6E73;
      --border:  #D2D2D7;
      --accent:  #0066CC;
      --r:       16px;
      --font:    -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    nav a:hover { color: var(--text); background: var(--surface); }

    /* ── Progress ── */
    #progressWrap { flex-shrink: 0; height: 3px; background: var(--sur2); display: none; }
    #progressFill { height: 100%; background: var(--accent); transition: width .35s ease; }

    /* ── AdSense banner slot ── */
    .ad-banner {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    /* 실제 애드센스 적용 시 위 .ad-banner 의 placeholder 텍스트 제거 후
       <ins class="adsbygoogle"> 태그를 이 div 안에 삽입하세요 */

    /* ── Screens ── */
    .screen { display: none; flex: 1; }
    .screen.active { display: flex; flex-direction: column; }

    /* ── Landing ── */
    #screen-landing {
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
      text-align: center;
    }
    .landing-icon {
      width: 72px; height: 72px;
      background: var(--surface);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
    }
    .landing-title {
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .landing-sub {
      font-size: 0.98rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 340px;
      margin: 0 auto 32px;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--text);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 14px 34px;
      border: none; border-radius: 999px;
      cursor: pointer; font-family: var(--font);
      transition: opacity .2s, transform .2s;
    }
    .btn-primary:hover { opacity: .82; transform: translateY(-1px); }
    .landing-meta { margin-top: 14px; font-size: 0.8rem; color: var(--muted); }
    .chips { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 32px; }
    .chip {
      font-size: 0.78rem; color: var(--muted);
      background: var(--surface);
      padding: 5px 13px; border-radius: 999px;
    }

    /* ── Quiz ── */
    #screen-quiz { overflow-y: auto; }
    .quiz-inner {
      width: 100%; max-width: 560px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .quiz-topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .btn-back {
      background: none; border: none;
      color: var(--muted); font-size: 0.85rem;
      font-family: var(--font); cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: color .15s;
    }
    .btn-back:hover { color: var(--text); }
    .q-counter { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
    .q-emoji { font-size: 2rem; margin-bottom: 10px; display: block; }
    .q-text {
      font-size: clamp(1.15rem, 3vw, 1.42rem);
      font-weight: 800; letter-spacing: -0.5px; line-height: 1.35;
      margin-bottom: 24px;
    }
    .options { display: flex; flex-direction: column; gap: 9px; }
    .opt-btn {
      display: flex; align-items: center; gap: 13px;
      padding: 15px 17px;
      background: var(--surface);
      border: 2px solid transparent; border-radius: var(--r);
      cursor: pointer; text-align: left;
      font-size: 0.92rem; font-weight: 500; color: var(--text);
      font-family: var(--font); width: 100%;
      transition: border-color .15s, background .15s;
    }
    .opt-btn:hover { border-color: var(--accent); background: rgba(0,102,204,.05); }
    .opt-btn.selected { border-color: var(--accent); background: rgba(0,102,204,.07); }
    .opt-e { font-size: 1.25rem; flex-shrink: 0; line-height: 1; }

    /* ── Loading ── */
    #screen-loading {
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--sur2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .loading-sub { color: var(--muted); font-size: 0.85rem; }

    /* ── Result ── */
    #screen-result { overflow-y: auto; }
    .result-inner {
      width: 100%; max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .result-header { text-align: center; margin-bottom: 36px; }
    .result-header-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .result-title {
      font-size: clamp(1.3rem, 3.5vw, 1.85rem);
      font-weight: 900; letter-spacing: -1px; margin-bottom: 5px;
    }
    .result-sub { color: var(--muted); font-size: 0.87rem; }

    /* ── AdSense mid-result slot ── */
    .ad-mid {
      background: var(--surface);
      border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      min-height: 100px;
      font-size: 0.75rem; color: var(--muted);
      margin-bottom: 20px;
    }
    /* 애드센스 적용 시 이 div 안에 <ins class="adsbygoogle"> 태그 삽입 */

    /* ── Phone Cards ── */
    .phone-cards { display: flex; flex-direction: column; gap: 14px; }

    .phone-card {
      border-radius: 20px;
      padding: 22px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .phone-card.rank-1 { background: var(--text); color: #fff; }
    .phone-card.rank-2, .phone-card.rank-3 { background: var(--surface); }

    .rank-pill {
      position: absolute; top: 18px; right: 18px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: .04em;
      padding: 3px 10px; border-radius: 999px;
    }
    .rank-1 .rank-pill { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); }
    .rank-2 .rank-pill, .rank-3 .rank-pill { background: rgba(0,0,0,.07); color: var(--muted); }

    /* Card body: phone visual + info side by side */
    .card-body {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    /* ── CSS Phone Mockup ── */
    .phone-mockup {
      flex-shrink: 0;
      width: 68px; height: 118px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }
    .phone-mockup .pm-body {
      position: absolute; inset: 0;
      border-radius: 14px;
    }
    .phone-mockup .pm-screen {
      position: absolute;
      top: 7px; left: 3px; right: 3px; bottom: 7px;
      border-radius: 11px;
    }
    .phone-mockup .pm-pill {
      position: absolute; top: 11px; left: 50%;
      transform: translateX(-50%);
      width: 22px; height: 5px;
      background: rgba(0,0,0,.45);
      border-radius: 3px;
      z-index: 2;
    }
    .phone-mockup .pm-hole {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 7px; height: 7px;
      background: rgba(0,0,0,.5);
      border-radius: 50%;
      z-index: 2;
    }
    /* Camera bumps */
    .phone-mockup .pm-cam {
      position: absolute;
      z-index: 2;
    }
    /* Notch style for older iPhones */
    .phone-mockup .pm-notch {
      position: absolute; top: 7px; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 10px;
      background: rgba(0,0,0,.45);
      border-radius: 0 0 8px 8px;
      z-index: 2;
    }

    /* iPhone 17 Pro Max */
    .pm-i17promax .pm-body { background: linear-gradient(145deg,#5A5A5E,#3A3A3C); }
    .pm-i17promax .pm-screen { background: linear-gradient(160deg,#1a2a4a,#0a1a2e); }
    .pm-i17promax .pm-cam-cluster {
      position: absolute; top: 10px; left: 8px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,.4);
      border-radius: 7px;
      z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }
    .pm-i17promax .pm-cam-cluster::before,
    .pm-i17promax .pm-cam-cluster::after {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: #222;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.15);
    }
    .pm-i17promax .pm-cam-cluster::before { top: 3px; left: 3px; }
    .pm-i17promax .pm-cam-cluster::after  { bottom: 3px; right: 3px; }

    /* iPhone 17 */
    .pm-i17 .pm-body { background: linear-gradient(145deg,#E8E8E0,#C8C8C0); }
    .pm-i17 .pm-screen { background: linear-gradient(160deg,#1a2a4a,#0a1a2e); }
    .pm-i17 .pm-cam2 {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 24px; height: 14px;
      background: rgba(0,0,0,.35);
      border-radius: 8px;
      z-index: 2;
    }

    /* Galaxy S26 Ultra */
    .pm-s26u .pm-body { background: linear-gradient(145deg,#1a1a2e,#16213E); }
    .pm-s26u .pm-screen { background: linear-gradient(160deg,#0d2137,#071528); }
    .pm-s26u .pm-cam-strip {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 30px; height: 26px;
      background: rgba(0,0,0,.5);
      border-radius: 8px;
      z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: space-around;
      padding: 3px;
    }

    /* Galaxy S26 */
    .pm-s26 .pm-body { background: linear-gradient(145deg,#2D2D30,#1a1a1a); }
    .pm-s26 .pm-screen { background: linear-gradient(160deg,#1a2a3a,#0a1520); }

    /* Pixel 9 Pro */
    .pm-pixel .pm-body { background: linear-gradient(145deg,#F2F2F2,#E0E0E0); }
    .pm-pixel .pm-screen { background: linear-gradient(160deg,#1a1a2e,#0d0d1e); }
    .pm-pixel .pm-bar {
      position: absolute; top: 14px; left: 0; right: 0;
      height: 18px;
      background: rgba(0,0,0,.08);
      z-index: 2;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .pm-pixel .pm-bar::before, .pm-pixel .pm-bar::after {
      content: '';
      width: 8px; height: 8px;
      background: #888;
      border-radius: 50%;
    }

    /* Z Flip6 */
    .pm-flip .pm-body { background: linear-gradient(145deg,#9b59b6,#8e44ad); }
    .pm-flip .pm-screen { background: linear-gradient(160deg,#2c1654,#1a0a30); }
    .pm-flip .pm-fold {
      position: absolute; top: 50%; left: 0; right: 0;
      height: 2px; background: rgba(0,0,0,.3);
      z-index: 2;
    }
    .pm-flip .pm-mini-screen {
      position: absolute; top: 10px; left: 8px; right: 8px;
      height: 28px; background: rgba(255,255,255,.12);
      border-radius: 6px; z-index: 2;
    }

    /* Galaxy A56 */
    .pm-a56 .pm-body { background: linear-gradient(145deg,#4A90D9,#357ABD); }
    .pm-a56 .pm-screen { background: linear-gradient(160deg,#1a2a4a,#0a1830); }
    .pm-a56 .pm-cam3 {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 22px;
      background: rgba(0,0,0,.3);
      border-radius: 6px;
      z-index: 2;
    }

    /* Shared camera dot helper */
    .cam-dot {
      width: 7px; height: 7px;
      background: #111; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.2);
      flex-shrink: 0;
    }
    .cam-dot.sm { width: 5px; height: 5px; }

    /* ── Card info ── */
    .card-info { flex: 1; min-width: 0; }
    .phone-name {
      font-size: 1.05rem;
      font-weight: 800; letter-spacing: -0.4px;
      margin-bottom: 3px; margin-right: 80px;
    }
    .phone-price { font-size: 0.8rem; font-weight: 500; margin-bottom: 12px; }
    .rank-1 .phone-price { color: rgba(255,255,255,.5); }
    .rank-2 .phone-price, .rank-3 .phone-price { color: var(--muted); }

    .match-row { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
    .match-track { flex: 1; height: 5px; border-radius: 999px; overflow: hidden; }
    .rank-1 .match-track { background: rgba(255,255,255,.15); }
    .rank-2 .match-track, .rank-3 .match-track { background: rgba(0,0,0,.09); }
    .match-fill {
      height: 100%; border-radius: 999px;
      transition: width 1s cubic-bezier(.22,1,.36,1);
    }
    .rank-1 .match-fill { background: #fff; }
    .rank-2 .match-fill, .rank-3 .match-fill { background: var(--accent); }
    .match-pct { font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
    .rank-1 .match-pct { color: rgba(255,255,255,.7); }
    .rank-2 .match-pct, .rank-3 .match-pct { color: var(--muted); }

    .phone-desc {
      font-size: 0.85rem; line-height: 1.6; margin-bottom: 12px;
    }
    .rank-1 .phone-desc { color: rgba(255,255,255,.65); }
    .rank-2 .phone-desc, .rank-3 .phone-desc { color: var(--muted); }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 0.73rem; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
    .rank-1 .tag { background: rgba(255,255,255,.12); color: rgba(255,255,255,.75); }
    .rank-2 .tag, .rank-3 .tag { background: rgba(0,0,0,.06); color: var(--muted); }

    /* New badge */
    .new-badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 700;
      background: #FF3B30; color: white;
      padding: 2px 7px; border-radius: 999px;
      margin-left: 7px; vertical-align: middle;
      letter-spacing: .04em;
    }

    /* Retry */
    .retry-wrap { text-align: center; margin-top: 28px; }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; color: var(--text);
      font-size: 0.85rem; font-weight: 600;
      padding: 10px 24px;
      border: 1.5px solid var(--border); border-radius: 999px;
      cursor: pointer; font-family: var(--font);
      transition: border-color .15s;
    }
    .btn-ghost:hover { border-color: var(--text); }

    /* Footer */
    footer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.76rem;
    }

    @media (max-width: 480px) {
      .quiz-inner, .result-inner { padding: 24px 16px 60px; }
      .phone-card { padding: 16px; }
      .phone-mockup { width: 58px; height: 100px; }
      .chips { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo" onclick="return goHome()">내 폰 추천<span>.</span></a>
  <nav>
    <a href="#">KT 요금제</a>
    <a href="#">고객센터</a>
  </nav>
</header>

<!-- ══ AdSense 상단 배너 슬롯 ══
     실제 적용 시 아래 div 내부에 애드센스 코드를 넣으세요
<div class="ad-banner">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXX" data-ad-slot="XXXX" data-ad-format="auto"></ins>
</div>
-->

<div id="progressWrap"><div id="progressFill" style="width:0%"></div></div>

<!-- ── LANDING ── -->
<div class="screen active" id="screen-landing">
  <div class="landing-icon">📱</div>
  <h1 class="landing-title">나에게 딱 맞는<br>폰 찾기</h1>
  <p class="landing-sub">7가지 질문으로 사용 패턴과 취향을 분석해<br>최신 플래그십부터 가성비 폰까지 추천해드려요.</p>
  <button class="btn-primary" onclick="startQuiz()">
    테스트 시작하기
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
  <p class="landing-meta">7개 질문 · 약 1분</p>
  <div class="chips">
    <span class="chip">✦ 무료</span>
    <span class="chip">✦ 2025~2026 최신 모델</span>
    <span class="chip">✦ 즉시 결과 확인</span>
  </div>
</div>

<!-- ── QUIZ ── -->
<div class="screen" id="screen-quiz">
  <div class="quiz-inner">
    <div class="quiz-topbar">
      <button class="btn-back" id="btnBack" onclick="prevQ()">← 이전</button>
      <span class="q-counter" id="qCounter">1 / 7</span>
    </div>
    <span class="q-emoji" id="qEmoji"></span>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optContainer"></div>
  </div>
</div>

<!-- ── LOADING ── -->
<div class="screen" id="screen-loading">
  <div class="spinner"></div>
  <div class="loading-title">분석 중이에요...</div>
  <div class="loading-sub">취향에 맞는 최적의 폰을 찾고 있어요</div>
</div>

<!-- ── RESULT ── -->
<div class="screen" id="screen-result">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-header-icon">🎯</div>
      <h2 class="result-title" id="resultTitle"></h2>
      <p class="result-sub">분석 완료 · 상위 3개 추천</p>
    </div>

    <!-- ══ AdSense 결과 중간 슬롯 ══
         실제 적용 시 아래 div 내부에 애드센스 코드를 넣으세요
    <div class="ad-mid">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXX" data-ad-slot="XXXX" data-ad-format="auto"></ins>
    </div>
    -->

    <div class="phone-cards" id="phoneCards"></div>

    <div class="retry-wrap">
      <button class="btn-ghost" onclick="restart()">↺ 다시 테스트하기</button>
    </div>
  </div>
</div>

<footer>© 2026 KT Corporation. All rights reserved.</footer>

<script>
// ══════════════════════════════════════════════════════════════
//  PHONES
//  ※ iPhone 17 / Galaxy S26: 2025년 9월·2026년 초 출시 모델
//    가격 및 스펙은 출시 정보 기준이므로 변경될 수 있습니다.
// ══════════════════════════════════════════════════════════════
const PHONES = [
  {
    id: 'i17promax',
    name: 'iPhone 17 Pro Max',
    isNew: true,
    pmClass: 'pm-i17promax',
    price: '약 210만원~ (예상)',
    desc: 'A19 Pro 칩셋과 혁신적인 카메라 시스템. Apple 생태계의 최정상, 사진·영상 창작자의 궁극적 선택.',
    tags: ['A19 Pro', '최고급 카메라', '4K 영상', 'iOS 19'],
  },
  {
    id: 'i17',
    name: 'iPhone 17',

// ══ STATE ══
let curQ = 0;
let answers = new Array(QS.length).fill(null);
let scores  = {};
PHONES.forEach(p => scores[p.id] = 0);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('progressWrap').style.display = id === 'quiz' ? 'block' : 'none';
}
function goHome() { restart(); return false; }

// ══ QUIZ ══
function startQuiz() {
  curQ = 0; answers.fill(null);
  PHONES.forEach(p => scores[p.id] = 0);
  showScreen('quiz'); render();
}

function render() {
  const q = QS[curQ];
  document.getElementById('qCounter').textContent = (curQ + 1) + ' / ' + QS.length;
  document.getElementById('qEmoji').textContent   = q.emoji;
  document.getElementById('qText').textContent    = q.text;
  document.getElementById('btnBack').style.visibility = curQ === 0 ? 'hidden' : 'visible';
  document.getElementById('progressFill').style.width = (curQ / QS.length * 100) + '%';

  const box = document.getElementById('optContainer');
  box.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[curQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-e">${opt.e}</span><span>${opt.t}</span>`;
    btn.onclick = () => pick(i);
    box.appendChild(btn);
  });
}

function pick(i) {
  if (answers[curQ] !== null) {
    Object.entries(QS[curQ].opts[answers[curQ]].s).forEach(([id,v]) => scores[id] -= v);
  }
  answers[curQ] = i;
  Object.entries(QS[curQ].opts[i].s).forEach(([id,v]) => scores[id] += v);
  document.querySelectorAll('.opt-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  setTimeout(() => { curQ < QS.length - 1 ? (curQ++, render()) : loading(); }, 260);
}

function prevQ() { if (curQ > 0) { curQ--; render(); } }

// ══ LOADING ══
function loading() { showScreen('loading'); setTimeout(showResult, 1500); }

// ══ RESULT ══
function showResult() {
  const sorted = [...PHONES].sort((a,b) => scores[b.id] - scores[a.id]);
  const top3   = sorted.slice(0,3);
  const best   = scores[top3[0].id] || 1;

  document.getElementById('resultTitle').textContent = top3[0].name + ' 추천!';

  const container = document.getElementById('phoneCards');
  container.innerHTML = '';
  const ranks = ['🥇 BEST MATCH','🥈 2순위','🥉 3순위'];
  const cls   = ['rank-1','rank-2','rank-3'];

  top3.forEach((phone, i) => {
    const pct  = Math.round(scores[phone.id] / best * 100);
    const card = document.createElement('div');
    card.className = `phone-card ${cls[i]}`;

    card.innerHTML = `
      <div class="rank-pill">${ranks[i]}</div>
      <div class="card-body">
        <div class="phone-mockup ${phone.pmClass}">${getMockupInner(phone.pmClass)}</div>
        <div class="card-info">
          <div class="phone-name">
            ${phone.name}
            ${phone.isNew ? '<span class="new-badge">NEW</span>' : ''}
          </div>
          <div class="phone-price">${phone.price}</div>
          <div class="match-row">
            <div class="match-track">
              <div class="match-fill" style="width:0%" data-w="${pct}%"></div>
            </div>
            <div class="match-pct">${pct}%</div>
          </div>
          <p class="phone-desc">${phone.desc}</p>
          <div class="tags">${phone.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  showScreen('result');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.match-fill').forEach(el => el.style.width = el.dataset.w);
  }));
}

function restart() {
  curQ = 0; answers.fill(null);
  PHONES.forEach(p => scores[p.id] = 0);
  showScreen('landing');
}
</script>
