<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 폰 추천 테스트 | KT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FFFFFF;
      --surface:   #F5F5F7;
      --surface2:  #EBEBED;
      --text:      #1D1D1F;
      --muted:     #6E6E73;
      --border:    #D2D2D7;
      --accent:    #0066CC;
      --radius:    16px;
      --font:      -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--accent); }

    nav { display: flex; gap: 4px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover { color: var(--text); background: var(--surface); }

    /* ── Progress bar ── */
    #progressWrap {
      flex-shrink: 0;
      height: 3px;
      background: var(--surface2);
      display: none;
    }
    #progressFill {
      height: 100%;
      background: var(--accent);
      transition: width 0.35s ease;
    }

    /* ── Screens ── */
    .screen { display: none; flex: 1; }
    .screen.active { display: flex; flex-direction: column; }

    /* ── Landing ── */
    #screen-landing {
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
      text-align: center;
    }

    .landing-icon {
      width: 80px; height: 80px;
      background: var(--surface);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      margin: 0 auto 28px;
    }

    .landing-title {
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -1.5px;
      margin-bottom: 14px;
    }

    .landing-sub {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 360px;
      margin: 0 auto 36px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--text);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 15px 36px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: var(--font);
      letter-spacing: -0.2px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.82; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .landing-meta {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .landing-features {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .feat-chip {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      padding: 6px 14px;
      border-radius: 999px;
    }

    /* ── Quiz ── */
    #screen-quiz {
      overflow-y: auto;
    }

    .quiz-inner {
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    .quiz-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .btn-back {
      background: none; border: none;
      color: var(--muted);
      font-size: 0.88rem;
      font-family: var(--font);
      cursor: pointer;
      padding: 6px 0;
      display: flex; align-items: center; gap: 4px;
      transition: color 0.15s;
    }
    .btn-back:hover { color: var(--text); }

    .q-counter {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 500;
    }

    .q-emoji {
      font-size: 2.2rem;
      margin-bottom: 12px;
      display: block;
    }

    .q-text {
      font-size: clamp(1.15rem, 3vw, 1.45rem);
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      font-size: 0.93rem;
      font-weight: 500;
      color: var(--text);
      font-family: var(--font);
      width: 100%;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .opt-btn:hover {
      border-color: var(--accent);
      background: rgba(0, 102, 204, 0.05);
    }
    .opt-btn:active { transform: scale(0.99); }
    .opt-btn.selected {
      border-color: var(--accent);
      background: rgba(0, 102, 204, 0.07);
    }
    .opt-emoji { font-size: 1.3rem; flex-shrink: 0; line-height: 1; }

    /* ── Loading ── */
    #screen-loading {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .loading-sub { color: var(--muted); font-size: 0.88rem; }

    /* ── Result ── */
    #screen-result { overflow-y: auto; }

    .result-inner {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .result-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .result-header-icon {
      font-size: 2.8rem;
      margin-bottom: 14px;
    }

    .result-title {
      font-size: clamp(1.3rem, 3.5vw, 1.9rem);
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .result-sub { color: var(--muted); font-size: 0.9rem; }

    /* Phone cards */
    .phone-cards { display: flex; flex-direction: column; gap: 14px; }

    .phone-card {
      border-radius: 20px;
      padding: 24px;
      position: relative;
    }

    .phone-card.rank-1 {
      background: var(--text);
      color: #fff;
    }

    .phone-card.rank-2, .phone-card.rank-3 {
      background: var(--surface);
      color: var(--text);
    }

    .rank-pill {
      position: absolute;
      top: 18px; right: 18px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .rank-1 .rank-pill {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
    }

    .rank-2 .rank-pill, .rank-3 .rank-pill {
      background: rgba(0,0,0,0.07);
      color: var(--muted);
    }

    .card-top {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
    }

    .phone-icon { font-size: 2.2rem; flex-shrink: 0; }

    .phone-name {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin-bottom: 3px;
    }

    .phone-price {
      font-size: 0.82rem;
      font-weight: 500;
    }

    .rank-1 .phone-price { color: rgba(255,255,255,0.55); }
    .rank-2 .phone-price, .rank-3 .phone-price { color: var(--muted); }

    .match-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }

    .match-track {
      flex: 1; height: 5px;
      border-radius: 999px;
      overflow: hidden;
    }

    .rank-1 .match-track { background: rgba(255,255,255,0.15); }
    .rank-2 .match-track, .rank-3 .match-track { background: rgba(0,0,0,0.09); }

    .match-fill {
      height: 100%; border-radius: 999px;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .rank-1 .match-fill { background: #fff; }
    .rank-2 .match-fill, .rank-3 .match-fill { background: var(--accent); }

    .match-pct {
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .rank-1 .match-pct { color: rgba(255,255,255,0.75); }
    .rank-2 .match-pct, .rank-3 .match-pct { color: var(--muted); }

    .phone-desc {
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .rank-1 .phone-desc { color: rgba(255,255,255,0.7); }
    .rank-2 .phone-desc, .rank-3 .phone-desc { color: var(--muted); }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .tag {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 999px;
    }

    .rank-1 .tag {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
    }

    .rank-2 .tag, .rank-3 .tag {
      background: rgba(0,0,0,0.06);
      color: var(--muted);
    }

    /* Retry */
    .retry-wrap {
      text-align: center;
      margin-top: 32px;
    }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 11px 26px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-family: var(--font);
      transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--text); }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 18px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .quiz-inner, .result-inner { padding: 28px 16px 60px; }
      .phone-card { padding: 18px; }
      .landing-features { display: none; }
    }
  </style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────────
let curQ = 0;
let answers = new Array(QS.length).fill(null);
let scores  = {};
PHONES.forEach(p => scores[p.id] = 0);

// ── HELPERS ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('progressWrap').style.display = id === 'quiz' ? 'block' : 'none';
}

function goHome() {
  restart();
  return false;
}

// ── QUIZ ─────────────────────────────────────────────────────────────────────
function startQuiz() {
  curQ = 0;
  answers.fill(null);
  PHONES.forEach(p => scores[p.id] = 0);
  showScreen('quiz');
  render();
}

function render() {
  const q = QS[curQ];
  document.getElementById('qCounter').textContent = (curQ + 1) + ' / ' + QS.length;
  document.getElementById('qEmoji').textContent   = q.emoji;
  document.getElementById('qText').textContent    = q.text;
  document.getElementById('btnBack').style.visibility = curQ === 0 ? 'hidden' : 'visible';
  document.getElementById('progressFill').style.width = (curQ / QS.length * 100) + '%';

  const box = document.getElementById('optContainer');
  box.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[curQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-emoji">${opt.e}</span><span>${opt.t}</span>`;
    btn.onclick = () => pick(i);
    box.appendChild(btn);
  });
}

function pick(i) {
  // Undo previous answer for this question
  if (answers[curQ] !== null) {
    const old = QS[curQ].opts[answers[curQ]].s;
    Object.entries(old).forEach(([id, v]) => scores[id] -= v);
  }
  // Apply new answer
  answers[curQ] = i;
  const ns = QS[curQ].opts[i].s;
  Object.entries(ns).forEach(([id, v]) => scores[id] += v);

  // Visual feedback
  document.querySelectorAll('.opt-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
  });

  setTimeout(() => {
    if (curQ < QS.length - 1) { curQ++; render(); }
    else { loading(); }
  }, 260);
}

function prevQuestion() {
  if (curQ > 0) { curQ--; render(); }
}

// ── LOADING ───────────────────────────────────────────────────────────────────
function loading() {
  showScreen('loading');
  setTimeout(showResult, 1600);
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function showResult() {
  const sorted = [...PHONES].sort((a, b) => scores[b.id] - scores[a.id]);
  const top3   = sorted.slice(0, 3);
  const best   = scores[top3[0].id];

  document.getElementById('resultTitle').textContent =
    top3[0].name + ' 추천!';

  const container = document.getElementById('phoneCards');
  container.innerHTML = '';

  const ranks  = ['🥇 BEST MATCH', '🥈 2순위', '🥉 3순위'];
  const cls    = ['rank-1', 'rank-2', 'rank-3'];

  top3.forEach((phone, i) => {
    const pct  = best > 0 ? Math.round(scores[phone.id] / best * 100) : 0;
    const card = document.createElement('div');
    card.className = `phone-card ${cls[i]}`;
    card.innerHTML = `
      <div class="rank-pill">${ranks[i]}</div>
      <div class="card-top">
        <div class="phone-icon">${phone.emoji}</div>
        <div>
          <div class="phone-name">${phone.name}</div>
          <div class="phone-price">${phone.price}</div>
        </div>
      </div>
      <div class="match-row">
        <div class="match-track">
          <div class="match-fill" style="width:0%" data-w="${pct}%"></div>
        </div>
        <div class="match-pct">${pct}%</div>
      </div>
      <p class="phone-desc">${phone.desc}</p>
      <div class="tags">${phone.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    `;
    container.appendChild(card);
  });

  showScreen('result');

  // Animate match bars
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.match-fill').forEach(el => {
      el.style.width = el.dataset.w;
    });
  }));
}

function restart() {
  curQ = 0;
  answers.fill(null);
  PHONES.forEach(p => scores[p.id] = 0);
  showScreen('landing');
}
